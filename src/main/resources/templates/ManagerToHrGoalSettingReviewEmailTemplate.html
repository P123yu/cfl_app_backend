<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Goal Setting Acceptance</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            color: #333;
            margin: 0;
            padding: 20px;
        }

        .container {
            background-color: #ffffff;
            padding: 30px;
            max-width: 600px;
            margin: 0 auto;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            border-radius: 15px;
            border: 1px solid #e0e0e0;
        }

        h1 {
            color: #0056b3;
            font-size: 28px;
            text-align: center;
            font-weight: bold;
            margin-bottom: 25px;
        }

        p {
            font-size: 16px;
            line-height: 1.6;
            color: #555;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin: 20px 0;
        }

        table, th, td {
            border: 1px solid #ddd;
        }

        th, td {
            padding: 10px;
            text-align: left;
            word-wrap: break-word;
            overflow-wrap: break-word;
        }

        th {
            background-color: #0056b3;
            color: white;
        }

        td {
            background-color: #f9f9f9;
        }

        .footer {
            text-align: center;
            font-size: 14px;
            color: #777;
            margin-top: 30px;
        }

        /* Responsive styling for small devices */
        @media (max-width: 600px) {
            h1 {
                font-size: 22px;
            }

            p, table {
                font-size: 14px;
            }

            .container {
                padding: 20px;
                max-width: 100%;
            }

            .footer {
                font-size: 12px;
                padding-top: 10px;
            }

            table, th, td {
                padding: 8px;
            }

            th {
                font-size: 16px;
            }

            td {
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <h1>Performance Review Accepted</h1>

    <p>Dear <span th:text="${hrName}"></span>,</p>

    <p>We are pleased to inform you that your <span th:text="${times}"></span> 30-60-90 days (quarter)
        <span th:text="${quarter}"></span> Performance Review discussion is accepted on <span th:text="${date}"></span>.</p>

    <p>Kindly be available for the discussion on the said date.</p>

    <table>
        <tr>
            <th>Goal Setting Status</th>
            <th>Date</th>
        </tr>
        <tr>
            <td>Accepted</td>
            <td th:text="${date}"></td>
        </tr>
    </table>

    <p>Best Regards,</p>
    <p th:text="${managerName}"></p>

    <div class="footer">
        <p>&copy; CMS COMPUTERS. All rights reserved.</p>
    </div>
</div>
</body>
</html>
